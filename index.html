<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Warbler Are You? 🐦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #7a9e7e;
    --gold: #e8b84b;
    --rust: #c0532a;
    --cream: #fdf6e3;
    --bark: #3d2b1a;
    --sky: #4a8fa8;
    --moss: #2d4a2f;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background-color: var(–sage);
font-family: ‘DM Sans’, sans-serif;
color: var(–bark);
min-height: 100vh;
background-image:
radial-gradient(ellipse at 10% 20%, rgba(122,158,126,0.18) 0%, transparent 60%),
radial-gradient(ellipse at 90% 80%, rgba(232,184,75,0.15) 0%, transparent 60%),
url(“data:image/svg+xml,%3Csvg width=‘60’ height=‘60’ viewBox=‘0 0 60 60’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cg fill=‘none’ fill-rule=‘evenodd’%3E%3Cg fill=’%237a9e7e’ fill-opacity=‘0.05’%3E%3Cpath d=‘M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z’/%3E%3C/g%3E%3C/g%3E%3C/svg%3E”);
}

.container {
max-width: 720px;
margin: 0 auto;
padding: 40px 20px 80px;
}

/* HEADER */
.header {
text-align: center;
margin-bottom: 48px;
animation: fadeDown 0.8s ease both;
}

.header .eyebrow {
font-size: 12px;
font-weight: 600;
letter-spacing: 4px;
text-transform: uppercase;
color: var(–sage);
margin-bottom: 12px;
}

.header h1 {
font-family: ‘Playfair Display’, serif;
font-size: clamp(2.4rem, 7vw, 4rem);
font-weight: 900;
line-height: 1.1;
color: var(–moss);
margin-bottom: 16px;
}

.header h1 span {
color: var(–rust);
font-style: italic;
}

.header p {
font-size: 1.05rem;
color: #5a4a3a;
max-width: 480px;
margin: 0 auto;
line-height: 1.6;
}

.bird-row {
display: flex;
justify-content: center;
gap: 6px;
font-size: 1.8rem;
margin-bottom: 20px;
animation: fadeDown 0.8s 0.1s ease both;
}

/* PROGRESS */
.progress-wrap {
margin-bottom: 32px;
animation: fadeIn 0.5s ease both;
}

.progress-label {
display: flex;
justify-content: space-between;
font-size: 12px;
font-weight: 600;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–sage);
margin-bottom: 8px;
}

.progress-bar {
height: 6px;
background: rgba(122,158,126,0.2);
border-radius: 99px;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–sage), var(–gold));
border-radius: 99px;
transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

/* QUESTION CARD */
.question-card {
background: #fff;
border-radius: 20px;
padding: 40px 36px;
box-shadow: 0 4px 40px rgba(61,43,26,0.10), 0 1px 4px rgba(61,43,26,0.06);
animation: slideUp 0.45s ease both;
}

.question-number {
font-size: 11px;
font-weight: 600;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–rust);
margin-bottom: 14px;
}

.question-text {
font-family: ‘Playfair Display’, serif;
font-size: clamp(1.2rem, 3.5vw, 1.55rem);
font-weight: 700;
line-height: 1.35;
color: var(–moss);
margin-bottom: 30px;
}

.options {
display: flex;
flex-direction: column;
gap: 12px;
}

.option {
display: flex;
align-items: flex-start;
gap: 14px;
padding: 16px 18px;
border: 2px solid rgba(122,158,126,0.25);
border-radius: 12px;
cursor: pointer;
background: var(–cream);
transition: all 0.2s ease;
text-align: left;
}

.option:hover {
border-color: var(–sage);
background: rgba(122,158,126,0.08);
transform: translateX(4px);
}

.option.selected {
border-color: var(–gold);
background: rgba(232,184,75,0.12);
}

.option-letter {
flex-shrink: 0;
width: 28px;
height: 28px;
border-radius: 50%;
background: rgba(122,158,126,0.15);
display: flex;
align-items: center;
justify-content: center;
font-size: 12px;
font-weight: 700;
color: var(–moss);
margin-top: 1px;
transition: all 0.2s;
}

.option.selected .option-letter {
background: var(–gold);
color: var(–bark);
}

.option-text {
font-size: 0.97rem;
line-height: 1.45;
color: #4a3a28;
}

/* NEXT BUTTON */
.btn-wrap {
margin-top: 28px;
display: flex;
justify-content: flex-end;
}

.btn {
font-family: ‘DM Sans’, sans-serif;
font-size: 0.9rem;
font-weight: 600;
letter-spacing: 1px;
text-transform: uppercase;
padding: 14px 32px;
border: none;
border-radius: 99px;
cursor: pointer;
background: var(–moss);
color: #fff;
transition: all 0.2s ease;
opacity: 0;
pointer-events: none;
}

.btn.visible {
opacity: 1;
pointer-events: all;
animation: popIn 0.3s ease;
}

.btn:hover {
background: var(–rust);
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(192,83,42,0.3);
}

/* RESULT */
.result-card {
background: #fff;
border-radius: 20px;
overflow: hidden;
box-shadow: 0 4px 40px rgba(61,43,26,0.12);
animation: slideUp 0.6s ease both;
display: none;
}

.result-card.show { display: block; }

.result-header {
padding: 48px 36px 36px;
text-align: center;
position: relative;
}

.result-emoji {
font-size: 5rem;
margin-bottom: 16px;
display: block;
animation: float 3s ease-in-out infinite;
}

.result-label {
font-size: 11px;
font-weight: 600;
letter-spacing: 4px;
text-transform: uppercase;
margin-bottom: 10px;
}

.result-name {
font-family: ‘Playfair Display’, serif;
font-size: clamp(2rem, 6vw, 3rem);
font-weight: 900;
line-height: 1.1;
margin-bottom: 20px;
}

.result-tagline {
font-size: 1.1rem;
font-weight: 600;
font-style: italic;
margin-bottom: 20px;
opacity: 0.85;
}

.result-body {
padding: 0 36px 40px;
}

.result-desc {
font-size: 1.0rem;
line-height: 1.7;
color: #4a3a28;
margin-bottom: 28px;
padding: 24px;
background: var(–cream);
border-radius: 12px;
border-left: 4px solid;
}

.result-facts {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
margin-bottom: 28px;
}

.fact-chip {
padding: 12px 14px;
border-radius: 10px;
background: rgba(122,158,126,0.08);
border: 1px solid rgba(122,158,126,0.2);
}

.fact-chip .fact-label {
font-size: 10px;
font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–sage);
margin-bottom: 4px;
}

.fact-chip .fact-val {
font-size: 0.88rem;
font-weight: 500;
color: var(–bark);
}

.retake-btn {
display: block;
width: 100%;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.9rem;
font-weight: 600;
letter-spacing: 1px;
text-transform: uppercase;
padding: 16px;
border: 2px solid var(–moss);
border-radius: 99px;
cursor: pointer;
background: transparent;
color: var(–moss);
transition: all 0.2s ease;
}

.retake-btn:hover {
background: var(–moss);
color: #fff;
}

/* ANIMATIONS */
@keyframes fadeDown {
from { opacity: 0; transform: translateY(-20px); }
to { opacity: 1; transform: translateY(0); }
}
@keyframes slideUp {
from { opacity: 0; transform: translateY(24px); }
to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
from { opacity: 0; } to { opacity: 1; }
}
@keyframes popIn {
0% { transform: scale(0.85); opacity: 0; }
70% { transform: scale(1.05); }
100% { transform: scale(1); opacity: 1; }
}
@keyframes float {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-10px); }
}

@media (max-width: 480px) {
.question-card { padding: 28px 20px; }
.result-header { padding: 36px 20px 24px; }
.result-body { padding: 0 20px 32px; }
.result-facts { grid-template-columns: 1fr; }
}
</style>

</head>
<body>
<div class="container">
  <div class="header">
    <div class="bird-row">🌿🐦🌸🐦🌿</div>
    <div class="eyebrow">BWIAB 4 Mommies</div>
    <h1>Which Warbler<br>Are <span>You?</span></h1>
    <p>Ever go to work and instead of working think 'huh, I like warblers. Does anyone remember buzzfeed quizzes?' Well, you're not alone! Answer 10 simple questions to see what kind of Warbler is what you is.</p>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">Question 1 of 10</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>

    <div class="question-number" id="questionNum">Question 1</div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsWrap"></div>
    <div class="btn-wrap">
      <button class="btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header" id="resultHeader">
      <span class="result-emoji" id="resultEmoji"></span>
      <div class="result-label" id="resultLabel">You are the...</div>
      <div class="result-name" id="resultName"></div>
      <div class="result-tagline" id="resultTagline"></div>
    </div>
    <div class="result-body">
      <div class="result-desc" id="resultDesc"></div>
      <div class="result-facts" id="resultFacts"></div>
      <button class="retake-btn" onclick="retake()">↺ Take it again</button>
    </div>
  </div>
</div>

<script>
const warblers = {

    color: "#e8b84b",
    tagline: "The ray of sunshine",
    desc: "*sweet sweet sweet I'm so sweet* — and honestly? You kind of are THAT GIRL. You are undeniably, unapologetically yourself — bright, warm, and impossible to miss. Like the Yellow Warbler, you show up with energy that fills the scrubby thicket. You're a people person who thrives in open, social settings and adapts effortlessly to new environments. You move quickly, arrive early to the party, and somehow always make it home first.",
    facts: { Vibe: "Radiant", Habitat: "Loves open, social spaces", Style: "Bold", Secret: "is an influencer" }

    desc: "*tsip tsip tsip tsip* You are a showstopper. The American Redstart fans its tail and flashes brilliant orange patches when it moves. You startle people and bugs around you with your moves - and you eat them UP. You're a natural performer who loves dynamic environments like the stage, forest edges, and shitting on data centers.",

  },

    emoji: "🌸",
    color: "#7a9e7e",
    tagline: "You WISH",
    desc: "*peep peep peep puh-deep* You have *the look*. The Magnolia Warbler's signature move is that unique white square band through the middle of its tail — instantly recognizable. You have a signature too: a distinctive aesthetic, a strong personal style, a vibe others try to copy but can't quite nail. You're active and social, comfortable moving between different groups (forest, scrub, urban parks, backyards), but you also have hidden depth. Peak you is May — structured, intentional, peak performance season.",

  },

    name: "Common Yellowthroat",
    emoji: "🎭",

    tagline: "Cool, understated, and deeply stylish",
    desc: "*chippy-chappy (idk)* You are the only warbler with a gray-blue head, back, and wings — meaning you stand out by refusing to overcomplicate things. The Canada Warbler's *necklace* of black streaks is its only flourish, worn with quiet confidence. You're a creature of shadows and undergrowth, preferring to move through life thoughtfully rather than loudly. You arrive in the third wave migration but when you show up, people notice.",
    facts: { Vibe: "Quiet icon", Habitat: "Shadowy, textured spaces", Style: "Minimalist with one statement piece", Secret: "Daddy issues" }
  },
  nashvillewarbler: {

    emoji: "💛",

const questions = [
  {
    q: "It's a beautiful spring morning. What are you doing?",
    opts: [
      { text: "The sky is awake so I'm awake! I'm an early riser and I hate missing the good light", w: { yellowwarbler: 2, blackandwhitewarbler: 2 } },
      { text: "Checking the groupme and seeing where my hug at", w: { commonYellowthroat: 2, nashvillewarbler: 2 } },

let current = 0;
let scores = {};
let selected = null;

for (let k in warblers) scores[k] = 0;

function render() {
  const q = questions[current];
  document.getElementById('questionNum').textContent = `Question ${current + 1}`;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('progressText').textContent = `Question ${current + 1} of ${questions.length}`;
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<div class="option-letter">${letters[i]}</div><div class="option-text">${opt.text}</div>`;
    div.onclick = () => selectOption(i, div);
    wrap.appendChild(div);
  });

  selected = null;
  document.getElementById('nextBtn').classList.remove('visible');

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideUp 0.45s ease both';
}

function selectOption(i, el) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selected = i;
  document.getElementById('nextBtn').classList.add('visible');
}

function nextQuestion() {
  if (selected === null) return;
  const q = questions[current];
  const weights = q.opts[selected].w;
  for (let k in weights) {
    if (scores[k] !== undefined) scores[k] += weights[k];
  }
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    render();
  }
}

function showResult() {
  let best = null, bestScore = -1;
  for (let k in scores) {
    if (scores[k] > bestScore) { bestScore = scores[k]; best = k; }
  }
  const w = warblers[best];

  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';

  document.getElementById('resultEmoji').textContent = w.emoji;
  document.getElementById('resultName').textContent = w.name;
  document.getElementById('resultTagline').textContent = '"' + w.tagline + '"';
  document.getElementById('resultLabel').textContent = 'You are the...';

  const header = document.getElementById('resultHeader');
  header.style.background = `linear-gradient(135deg, ${w.color}18 0%, ${w.color}08 100%)`;
  document.getElementById('resultName').style.color = w.color === '#e8b84b' ? '#b8860b' : w.color;
  document.getElementById('resultLabel').style.color = w.color;

  const desc = document.getElementById('resultDesc');
  desc.textContent = w.desc;
  desc.style.borderLeftColor = w.color;

  const facts = document.getElementById('resultFacts');
  facts.innerHTML = '';
  for (let label in w.facts) {
    const chip = document.createElement('div');
    chip.className = 'fact-chip';
    chip.innerHTML = `<div class="fact-label">${label}</div><div class="fact-val">${w.facts[label]}</div>`;
    facts.appendChild(chip);
  }

  const card = document.getElementById('resultCard');
  card.classList.add('show');

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function retake() {
  current = 0;
  selected = null;
  for (let k in scores) scores[k] = 0;
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('questionCard').style.display = 'block';
  document.getElementById('progressWrap').style.display = 'block';
  render();
}

render();
</script>

</body>
</html>
